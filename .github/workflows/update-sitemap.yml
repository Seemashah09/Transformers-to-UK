name: Update sitemap lastmod

on:
  push:
    branches:
      - main   # your branch
  workflow_dispatch:

jobs:
  update-sitemap:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Update the lastmod date
      - name: Update lastmod in sitemap.xml
        run: |
          TODAY=$(date +'%Y-%m-%d')
          if [ -f sitemap.xml ]; then
            sed -i "s/{{DATE}}/$TODAY/" sitemap.xml
          else
            echo "sitemap.xml not found!"
            exit 1
          fi

      # Step 3: Commit and push the updated sitemap
      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git commit -m "Update sitemap lastmod to $TODAY" || echo "No changes to commit"
          git push
